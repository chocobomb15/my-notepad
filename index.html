// ─── Firestore ───────────────
function uid(){return "shared";}
function foldersCol(){return collection(db,"users",uid(),"folders");}
function filesCol()  {return collection(db,"users",uid(),"files");}
async function saveFolder(f){await setDoc(doc(foldersCol(),f.id),f);}
async function saveFile(f)  {await setDoc(doc(filesCol(),f.id),f);}
async function delFolder(id){await deleteDoc(doc(foldersCol(),id));}
async function delFile(id)  {await deleteDoc(doc(filesCol(),id));}

async function loadData(){
  const [fSnap,fileSnap]=await Promise.all([
    getDocs(query(foldersCol(),orderBy("createdAt"))),
    getDocs(query(filesCol(),  orderBy("createdAt")))
  ]);
  state.folders=fSnap.docs.map(d=>d.data()).sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt));
  state.files  =fileSnap.docs.map(d=>d.data()).sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt));
  if(state.folders.length===0){
    const f1={id:genId(),name:"개인",color:COLORS[0],createdAt:Date.now(),order:0,parentId:null};
    const f2={id:genId(),name:"업무",color:COLORS[1],createdAt:Date.now()+1,order:1,parentId:null};
    const fi1={id:genId(),folderId:f1.id,name:"일기.md",content:"오늘의 일기를 작성해보세요...",createdAt:Date.now(),order:0};
    const fi2={id:genId(),folderId:f2.id,name:"할일목록.md",content:"할일 목록을 작성해보세요.",createdAt:Date.now()+1,order:0};
    await Promise.all([saveFolder(f1),saveFolder(f2),saveFile(fi1),saveFile(fi2)]);
    state.folders=[f1,f2];state.files=[fi1,fi2];
    state.openFolderIds=[f1.id];state.tabs=[{fileId:fi1.id,folderId:f1.id}];state.activeTab=fi1.id;
  }
  render();
}

// ─── Content helpers ─────────
function textToHTML(content){
  if(isHTML(content)) return content;
  return content.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .split("\n").map(l=>`<div>${l||"<br>"}</div>`).join("");
}
function isHTML(s){return /<(strong|em|b|i|s|del|div|br|p|u)\b/i.test(s);}
function htmlToMarkdown(html){
  let md=html;
  md=md.replace(/<strong>([\s\S]*?)<\/strong>/gi,"**$1**");
  md=md.replace(/<b>([\s\S]*?)<\/b>/gi,"**$1**");
  md=md.replace(/<em>([\s\S]*?)<\/em>/gi,"*$1*");
  md=md.replace(/<i>([\s\S]*?)<\/i>/gi,"*$1*");
  md=md.replace(/<s>([\s\S]*?)<\/s>/gi,"~~$1~~");
  md=md.replace(/<strike>([\s\S]*?)<\/strike>/gi,"~~$1~~");
  md=md.replace(/<del>([\s\S]*?)<\/del>/gi,"~~$1~~");
  md=md.replace(/<u>([\s\S]*?)<\/u>/gi,"$1");
  md=md.replace(/<br\s*\/?>/gi,"\n");
  md=md.replace(/<div><br\s*\/?><\/div>/gi,"\n");
  md=md.replace(/<\/div><div>/gi,"\n");
  md=md.replace(/<div>/gi,"\n").replace(/<\/div>/gi,"");
  md=md.replace(/<\/p>/gi,"\n").replace(/<p>/gi,"");
  md=md.replace(/<[^>]+>/g,"");
  md=md.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&nbsp;/g," ");
  return md.replace(/\n{3,}/g,"\n\n").replace(/^\n+/,"").trim();
}
function htmlToText(html){
  let t=htmlToMarkdown(html);
  t=t.replace(/\*\*([\s\S]*?)\*\*/g,"$1").replace(/\*([\s\S]*?)\*/g,"$1").replace(/~~([\s\S]*?)~~/g,"$1");
  return t;
}
function getEditorContent(){const e=document.getElementById("editor");return e?e.innerHTML:"";}

// ─── Text / format ───────────
function handleTextChange(){
  const content=getEditorContent();
  state.files=state.files.map(f=>f.id===state.activeTab?{...f,content}:f);
  updateStatusBar();
  const t=T(),si=document.getElementById("saveindicator");
  if(si) si.innerHTML=`<span style="color:${t.mt};font-size:10px;">저장 중...</span>`;
  clearTimeout(state.saveTimer);
  state.saveTimer=setTimeout(async()=>{
    const f=state.files.find(f=>f.id===state.activeTab);
    if(f) await saveFile(f);
    const s2=document.getElementById("saveindicator");
    if(s2) s2.innerHTML=`<span style="color:#34d399;font-size:10px;">✓ 저장됨</span>`;
  },700);
}
function applyFormat(type){
  const ed=document.getElementById("editor");if(!ed)return;
  ed.focus();
  const cmd=type==="bold"?"bold":type==="italic"?"italic":type==="underline"?"underline":"strikeThrough";
  document.execCommand(cmd,false,null);
  handleTextChange();
}
function insertDateTime(){
  const ed=document.getElementById("editor");if(!ed)return;
  ed.focus();
  const now=new Date();
  document.execCommand("insertText",false,`${now.toLocaleDateString("ko-KR")} ${now.toLocaleTimeString("ko-KR")}`);
  handleTextChange();
}
function exportFile(format){
  const file=state.files.find(f=>f.id===state.activeTab);if(!file)return;
  const base=file.name.replace(/\.[^/.]+$/,"");
  const content=format==="md"?htmlToMarkdown(file.content):htmlToText(file.content);
  const blob=new Blob([content],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=base+(format==="md"?".md":".txt");a.click();
  URL.revokeObjectURL(url);
}
async function convertToMd(fileId){
  state.files=state.files.map(f=>f.id===fileId?{...f,name:f.name.replace(/\.txt$/i,".md")}:f);
  await saveFile(state.files.find(f=>f.id===fileId));render();

// ─── Find / Replace ──────────
function handleFind(dir){
  const ed=document.getElementById("editor");if(!ed||!state.findText)return;
  if(dir) state.findDirection=dir;
  const direction=state.findDirection||'down';
  const walker=document.createTreeWalker(ed,NodeFilter.SHOW_TEXT);
  const nodes=[];let nd;
  while(nd=walker.nextNode()) nodes.push(nd);
  let fullText="",offsets=[];
  nodes.forEach(n=>{offsets.push(fullText.length);fullText+=n.textContent;});
  const matches=[];
  for(let i=0;i<=fullText.length-state.findText.length;){
    const idx=fullText.indexOf(state.findText,i);if(idx===-1)break;
    matches.push(idx);i=idx+1;
  }
  const countEl=document.getElementById("findCount");
  if(!matches.length){if(countEl)countEl.textContent="없음";state.findIndex=-1;return;}
  if(direction==='down'){
    state.findIndex=state.findIndex===-1?0:(state.findIndex+1)%matches.length;
  } else {
    state.findIndex=state.findIndex===-1?matches.length-1:(state.findIndex-1+matches.length)%matches.length;
  }
  const ms=matches[state.findIndex],me=ms+state.findText.length;
  let sn=null,so=0,en=null,eo=0;
  for(let i=0;i<nodes.length;i++){
    const s=offsets[i],e=s+nodes[i].textContent.length;
    if(!sn&&ms>=s&&ms<=e){sn=nodes[i];so=ms-s;}
    if(!en&&me>=s&&me<=e){en=nodes[i];eo=me-s;}
  }
  if(sn&&en){
    const range=document.createRange();
    range.setStart(sn,so);range.setEnd(en,eo);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    const edEl=document.getElementById("editor");
    const nodeEl=sn.parentElement;
    if(edEl&&nodeEl){
      const relTop=nodeEl.getBoundingClientRect().top-edEl.getBoundingClientRect().top+edEl.scrollTop;
      edEl.scrollTop=relTop-edEl.clientHeight/2;
    }
    setTimeout(()=>document.getElementById("findInput")?.focus(),0);
  }
  if(countEl) countEl.textContent=`${state.findIndex+1} / ${matches.length}`;
}
async function handleReplace(){
  const file=state.files.find(f=>f.id===state.activeTab);if(!file||!state.findText)return;
  const newHTML=textToHTML(htmlToMarkdown(file.content).replaceAll(state.findText,state.replaceText));
  state.files=state.files.map(f=>f.id===state.activeTab?{...f,content:newHTML}:f);
  const ed=document.getElementById("editor");if(ed)ed.innerHTML=newHTML;
  await saveFile({...file,content:newHTML});updateStatusBar();
}

// ─── Move helpers ─────────────
function getAllDescendantFolderIds(folderId){
  const result=[folderId];
  state.folders.filter(f=>f.parentId===folderId).forEach(c=>result.push(...getAllDescendantFolderIds(c.id)));
  return result;
}

// 파일을 다른 폴더로 이동
async function moveFileTo(fileId,targetFolderId){
  const maxO=state.files.filter(f=>f.folderId===targetFolderId).reduce((m,f)=>Math.max(m,f.order??0),0);
  state.files=state.files.map(f=>f.id===fileId?{...f,folderId:targetFolderId,order:maxO+1}:f);
  state.tabs=state.tabs.map(t=>t.fileId===fileId?{...t,folderId:targetFolderId}:t);
  const file=state.files.find(f=>f.id===fileId);
  await saveFile(file);
  state.moveModal=null;render();
}

// 폴더를 다른 폴더 아래로 이동
async function moveFolderTo(folderId,targetParentId){
  // 자기 자신의 하위로 이동 방지
  if(folderId===targetParentId) return;
  if(getAllDescendantFolderIds(folderId).includes(targetParentId)) return;
  const maxO=state.folders.filter(f=>(f.parentId||null)===(targetParentId||null)).reduce((m,f)=>Math.max(m,f.order??0),0);
  state.folders=state.folders.map(f=>f.id===folderId?{...f,parentId:targetParentId||null,order:maxO+1}:f);
  const folder=state.folders.find(f=>f.id===folderId);
  await saveFolder(folder);
  state.moveModal=null;render();
}

// ─── Folder / File actions ────
function getAncestorIds(folderId){
  const result=[];
  let cur=state.folders.find(f=>f.id===folderId);
  while(cur&&cur.parentId){result.push(cur.parentId);cur=state.folders.find(f=>f.id===cur.parentId);}
  return result;
}
function toggleFolder(folderId){
  const isOpen=state.openFolderIds.includes(folderId);
  if(isOpen){
    const allIds=getAllDescendantFolderIds(folderId);
    state.openFolderIds=state.openFolderIds.filter(id=>!allIds.includes(id));
    const fileIds=state.files.filter(f=>allIds.includes(f.folderId)).map(f=>f.id);
    state.tabs=state.tabs.filter(t=>!fileIds.includes(t.fileId));
    if(fileIds.includes(state.activeTab)) state.activeTab=state.tabs.length>0?state.tabs[state.tabs.length-1].fileId:null;
  } else {
    // 상위폴더 ID들을 보존하면서 열기
    const ancestors=getAncestorIds(folderId);
    const keepIds=new Set([folderId,...ancestors]);
    const otherIds=state.files.filter(f=>!keepIds.has(f.folderId)).map(f=>f.id);
    state.tabs=state.tabs.filter(t=>!otherIds.includes(t.fileId));
    state.openFolderIds=[...new Set([...ancestors,folderId])];
// 다른 폴더 탭 모두 닫고 이 폴더 파일만 열기
    const ff=state.files.filter(f=>f.folderId===folderId);
    state.tabs=ff.map(f=>({fileId:f.id,folderId}));
    state.activeTab=ff.length>0?ff[0].id:null;
  }
  render();
}
function scrollToActiveTab(){
  setTimeout(()=>{
    const tabBar=document.getElementById("tabBar");
    const el=document.querySelector(`[data-file-id="${state.activeTab}"]`);
    if(!tabBar||!el) return;
    const barLeft=tabBar.scrollLeft;
    const barRight=barLeft+tabBar.clientWidth;
    const elLeft=el.offsetLeft;
    const elRight=elLeft+el.offsetWidth;
    // 탭이 이미 보이는 영역 안에 있으면 스크롤 안 함
    if(elLeft>=barLeft && elRight<=barRight) return;
    // 화면 밖에 있을 때만 최소한으로 스크롤
    if(elLeft<barLeft) tabBar.scrollLeft=elLeft;
    else tabBar.scrollLeft=elRight-tabBar.clientWidth;
  },60);
}
function openFile(file){
  if(!state.tabs.find(t=>t.fileId===file.id)) state.tabs=[...state.tabs,{fileId:file.id,folderId:file.folderId}];
  state.activeTab=file.id;render();scrollToActiveTab();
}
function closeTab(fileId){
  state.tabs=state.tabs.filter(t=>t.fileId!==fileId);
  if(state.activeTab===fileId) state.activeTab=state.tabs.length>0?state.tabs[state.tabs.length-1].fileId:null;
  render();
}
async function newFile(folderId){
  const maxO=state.files.filter(f=>f.folderId===folderId).reduce((m,f)=>Math.max(m,f.order??0),0);
  const f={id:genId(),folderId,name:"새 파일.md",content:"",createdAt:Date.now(),order:maxO+1};
  state.files=[...state.files,f];state.tabs=[...state.tabs,{fileId:f.id,folderId}];
  state.activeTab=f.id;state.renamingId=f.id;state.renamingVal="새 파일.md";
  await saveFile(f);render();
}
async function newFolder(parentId=null){
  const name=state.newFolderName.trim();
  if(!name){state.newFolderMode=false;state.newFolderName="";state.newFolderParentId=null;render();return;}
  const siblings=state.folders.filter(f=>(f.parentId||null)===(parentId||null));
  const maxO=siblings.reduce((m,f)=>Math.max(m,f.order??0),-1);
  const f={id:genId(),name,color:COLORS[state.folders.length%COLORS.length],createdAt:Date.now(),order:maxO+1,parentId:parentId||null};
  state.folders=[...state.folders,f];state.newFolderMode=false;state.newFolderName="";state.newFolderParentId=null;
  await saveFolder(f);render();
}
async function commitRename(id){
  const val=state.renamingVal.trim();
  if(val){state.files=state.files.map(f=>f.id===id?{...f,name:val}:f);await saveFile(state.files.find(f=>f.id===id));}
  state.renamingId=null;render();
}
async function deleteFile(id){
  closeTab(id);state.files=state.files.filter(f=>f.id!==id);state.contextMenu=null;
  await delFile(id);render();
}
async function deleteFolder(folderId){
  const allIds=getAllDescendantFolderIds(folderId);
  const fileIds=state.files.filter(f=>allIds.includes(f.folderId)).map(f=>f.id);
  state.tabs=state.tabs.filter(t=>!fileIds.includes(t.fileId));
  if(fileIds.includes(state.activeTab)) state.activeTab=null;
  state.files=state.files.filter(f=>!allIds.includes(f.folderId));
  state.folders=state.folders.filter(f=>!allIds.includes(f.id));
  state.contextMenu=null;
  await Promise.all([...fileIds.map(id=>delFile(id)),...allIds.map(id=>delFolder(id))]);render();
}
async function changeFolderColor(folderId, color){
  state.folders=state.folders.map(f=>f.id===folderId?{...f,color}:f);
  await saveFolder(state.folders.find(f=>f.id===folderId));
  state.contextMenu=null; render();
}

// ─── Drag-and-drop ───────────
function initSortables(){
  if(!window.Sortable) return;

  function syncTabsToFiles(folderId){
    const ordered=state.files.filter(f=>f.folderId===folderId).sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt));
    const ids=new Set(ordered.map(f=>f.id));
    const others=state.tabs.filter(t=>!ids.has(t.fileId));
    const mine=ordered.map(f=>state.tabs.find(t=>t.fileId===f.id)).filter(Boolean);
    state.tabs=[...others,...mine];
  }
  async function syncFilesToTabs(){
    const tabFileIds=state.tabs.map(t=>t.fileId);
    state.files=state.files.map(f=>{const idx=tabFileIds.indexOf(f.id);return idx!==-1?{...f,order:idx}:f;});
    await Promise.all(state.files.filter(f=>tabFileIds.includes(f.id)).map(f=>saveFile(f)));
  }

  function initFolder(folder){
    const fl=document.getElementById(`fileList-${folder.id}`);
    if(fl) Sortable.create(fl,{animation:150,handle:".drag-handle",onEnd:async(evt)=>{
      const ff=state.files.filter(f=>f.folderId===folder.id);
      const [m]=ff.splice(evt.oldIndex,1);ff.splice(evt.newIndex,0,m);
      const upd=ff.map((f,i)=>({...f,order:i}));
      state.files=state.files.map(f=>upd.find(u=>u.id===f.id)||f);
      syncTabsToFiles(folder.id);
      await Promise.all(upd.map(f=>saveFile(f)));
      render();
    }});
    const sl=document.getElementById(`subList-${folder.id}`);
    if(sl) Sortable.create(sl,{animation:150,handle:".drag-handle",onEnd:async(evt)=>{
      const subs=state.folders.filter(f=>f.parentId===folder.id);
      const [m]=subs.splice(evt.oldIndex,1);subs.splice(evt.newIndex,0,m);
      const upd=subs.map((f,i)=>({...f,order:i}));
      state.folders=state.folders.map(f=>upd.find(u=>u.id===f.id)||f);
      await Promise.all(upd.map(f=>saveFolder(f)));
    }});
    state.folders.filter(f=>f.parentId===folder.id).forEach(sub=>initFolder(sub));
  }

  const root=document.getElementById("folderList-root");
  if(root) Sortable.create(root,{animation:150,handle:".drag-handle",onEnd:async(evt)=>{
    const roots=state.folders.filter(f=>!f.parentId);
    const [m]=roots.splice(evt.oldIndex,1);roots.splice(evt.newIndex,0,m);
    const upd=roots.map((f,i)=>({...f,order:i}));
    state.folders=state.folders.map(f=>upd.find(u=>u.id===f.id)||f);
    await Promise.all(upd.map(f=>saveFolder(f)));
  }});
  state.folders.filter(f=>!f.parentId).forEach(f=>initFolder(f));

  const tabBar=document.getElementById("tabBar");
  if(tabBar) Sortable.create(tabBar,{animation:150,filter:".tab-close-btn",onEnd:async(evt)=>{
    const [m]=state.tabs.splice(evt.oldIndex,1);state.tabs.splice(evt.newIndex,0,m);
    await syncFilesToTabs();
    render();
  }});
}

// ─── Theme & CSS ─────────────
function T(){return state.dark
  ?{bg:"#0f1117",sb:"#161b22",tab:"#1c2128",tabA:"#0f1117",bd:"#30363d",tx:"#e6edf3",mt:"#8b949e",ac:"#58a6ff",hv:"#21262d",inp:"#161b22",toolbar:"#161b22"}
  :{bg:"#ffffff",sb:"#f6f8fa",tab:"#f6f8fa",tabA:"#ffffff",bd:"#d0d7de",tx:"#1f2328",mt:"#57606a",ac:"#0969da",hv:"#eaeef2",inp:"#f6f8fa",toolbar:"#f6f8fa"};}
function esc(s=""){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
const btnC =t=>`background:none;border:1px solid ${t.bd};border-radius:5px;cursor:pointer;color:${t.tx};padding:3px 8px;font-size:13px;font-family:inherit;`;
const inpC =t=>`background:${t.inp};border:1px solid ${t.bd};border-radius:4px;color:${t.tx};padding:3px 8px;font-size:11px;font-family:inherit;outline:none;`;
const actC =t=>`background:${t.ac}22;border:1px solid ${t.ac}44;border-radius:4px;cursor:pointer;color:${t.ac};padding:3px 10px;font-size:11px;font-family:inherit;`;
const fmtC =t=>`background:none;border:1px solid ${t.bd};border-radius:4px;cursor:pointer;color:${t.mt};padding:2px 9px;font-size:12px;font-family:inherit;min-width:28px;`;
const cvtC =t=>`background:${t.ac}18;border:1px solid ${t.ac}55;border-radius:4px;cursor:pointer;color:${t.ac};padding:2px 9px;font-size:11px;font-family:inherit;`;
const dh   =`<span class="drag-handle" style="cursor:grab;color:#8b949e;font-size:10px;padding:0 2px;flex-shrink:0;" title="드래그로 순서 변경">⠿</span>`;

function updateStatusBar(){
  const file=state.files.find(f=>f.id===state.activeTab);
  const t=T(),sb=document.getElementById("statusbar");if(!sb)return;
  const txt=file?htmlToText(file.content):"";
  sb.innerHTML=file
    ?`<span>${esc(file.name)}</span><span>줄: ${txt.split("\n").length}</span><span>글자: ${txt.length}</span><span>${state.wordWrap?"줄 바꿈 켜짐":"꺼짐"}</span><div style="flex:1"></div><span>F5: 날짜 삽입 · Ctrl+H: 찾기/바꾸기</span>`
    :`<div style="flex:1"></div><span>F5: 날짜 삽입 · Ctrl+H: 찾기/바꾸기</span>`;
}

// ─── 이동 모달 렌더링 ─────────
function renderMoveModal(t,fontFamily){
  if(!state.moveModal) return "";
  const {itemId,itemType}=state.moveModal;
  // 파일이동: 모든 폴더 선택 가능 / 폴더이동: 자기자신·하위폴더 제외
  const excluded=itemType==="folder"?getAllDescendantFolderIds(itemId):[];
  const targets=state.folders.filter(f=>!excluded.includes(f.id));

  function folderOptions(parentId,depth){
    return state.folders
      .filter(f=>(f.parentId||null)===(parentId||null)&&!excluded.includes(f.id))
      .sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt))
      .map(f=>`
        <div onclick="window._moveTo('${f.id}')"
          style="display:flex;align-items:center;gap:8px;padding:8px ${12+depth*16}px;cursor:pointer;border-radius:6px;"
          onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">
          <span style="color:${f.color};">📁</span>
          <span style="font-size:13px;">${esc(f.name)}</span>
        </div>
        ${folderOptions(f.id,depth+1)}`
      ).join("");
  }

  // 폴더이동: 루트(최상위)로 이동 옵션 추가
  const rootOption=itemType==="folder"?`
    <div onclick="window._moveTo('__root__')"
      style="display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-radius:6px;"
      onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">
      <span>🏠</span><span style="font-size:13px;">최상위 (루트)</span>
    </div>`:"";

  return `
  <div onclick="window._closeMoveModal()" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:center;justify-content:center;">
    <div onclick="event.stopPropagation()" style="background:${t.sb};border:1px solid ${t.bd};border-radius:12px;padding:20px;min-width:260px;max-height:420px;overflow-y:auto;box-shadow:0 16px 40px rgba(0,0,0,0.3);font-family:${fontFamily};">
      <div style="font-size:14px;font-weight:700;color:${t.tx};margin-bottom:12px;">📂 이동할 폴더 선택</div>
      <div style="font-size:11px;color:${t.mt};margin-bottom:10px;">${itemType==="file"
        ?"파일: "+esc(state.files.find(f=>f.id===itemId)?.name||"")
        :"폴더: "+esc(state.folders.find(f=>f.id===itemId)?.name||"")}</div>
      <div style="border-top:1px solid ${t.bd};padding-top:8px;">
        ${rootOption}
        ${folderOptions(null,0)}
        ${targets.length===0&&itemType!=="folder"?`<div style="color:${t.mt};font-size:12px;padding:8px;">이동 가능한 폴더가 없습니다.</div>`:""}
      </div>
      <button onclick="window._closeMoveModal()" style="${btnC(t)};margin-top:12px;width:100%;text-align:center;">취소</button>
    </div>
  </div>`;
}

// ─── Recursive folder renderer ─
function renderFolderTree(parentId,depth){
  const t=T();
  const children=state.folders.filter(f=>(f.parentId||null)===(parentId||null))
    .sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt));
  if(!children.length) return "";
  const items=children.map(folder=>{
    const isOpen=state.openFolderIds.includes(folder.id);
    const ff=state.files.filter(f=>f.folderId===folder.id).sort((a,b)=>(a.order??a.createdAt)-(b.order??b.createdAt));
    const pad=12+depth*14;
    return `<div>
      <div class="folder-row" onclick="window._tf('${folder.id}')" oncontextmenu="window._cm(event,'folder','${folder.id}')"
        style="display:flex;align-items:center;padding:6px 8px 6px ${pad}px;cursor:pointer;gap:4px;border-radius:4px;margin:1px 6px;"
        onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">
        ${dh}
        <span style="font-size:10px;color:${t.mt};">${isOpen?"▾":"▸"}</span>
        <span style="position:relative;display:inline-block;font-size:${depth>0?12:13}px;">📁<span style="position:absolute;bottom:-1px;right:-3px;width:8px;height:8px;border-radius:50%;background:${folder.color};border:2px solid ${t.sb};"></span></span>
        <span style="font-size:${depth>0?11:12}px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(folder.name)}</span>
        <span style="font-size:10px;color:${t.mt};">${ff.length}</span>
        <button onclick="event.stopPropagation();window._nf('${folder.id}')" style="${btnC(t)};font-size:11px;padding:1px 5px;">+</button>
      </div>
      ${isOpen?`
        <!-- 하위폴더 먼저 표시 -->
        <div id="subList-${folder.id}">
          ${renderFolderTree(folder.id,depth+1)}
        </div>
        <!-- 파일 목록 -->
        <div id="fileList-${folder.id}">
          ${ff.map(file=>`
            <div class="file-row" onclick="window._of('${file.id}')" oncontextmenu="window._cm(event,'file','${file.id}')"
              style="display:flex;align-items:center;padding:4px 8px 4px ${pad+16}px;cursor:pointer;gap:4px;border-radius:4px;margin:1px 6px;
                background:${state.activeTab===file.id?t.ac+"22":"transparent"};
                border-left:${state.activeTab===file.id?`2px solid ${t.ac}`:"2px solid transparent"};"
              onmouseenter="this.style.background='${state.activeTab===file.id?t.ac+"22":t.hv}'"
              onmouseleave="this.style.background='${state.activeTab===file.id?t.ac+"22":"transparent"}'">
              ${dh}
              <span style="font-size:11px;">📄</span>
              ${state.renamingId===file.id
                ?`<input id="renameInput" value="${esc(state.renamingVal)}" onclick="event.stopPropagation()" oninput="window._ri(this.value)" onkeydown="window._rk(event,'${file.id}')" onblur="window._rc('${file.id}')" style="${inpC(t)};flex:1;font-size:11px;"/>`
                :`<span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(file.name)}</span>`}
            </div>`).join("")}
        </div>`:""}
    </div>`;
  }).join("");
  if(parentId) return items;
  return `<div id="folderList-root">${items}</div>`;
}

// ─── Render ──────────────────

             <div onclick="window._ctxA('movefile','${state.contextMenu.id}')" style="padding:8px 16px;cursor:pointer;font-size:12px;" onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">다른 폴더로 이동</div>
             <div onclick="window._ctxA('delfile','${state.contextMenu.id}')" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#f87171;" onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">삭제</div>`
          :`<div onclick="window._ctxA('newfile','${state.contextMenu.id}')" style="padding:8px 16px;cursor:pointer;font-size:12px;" onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">새 파일</div>
             <div onclick="window._ctxA('newsubfolder','${state.contextMenu.id}')" style="padding:8px 16px;cursor:pointer;font-size:12px;" onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">새 하위폴더</div>
             <div onclick="window._ctxA('movefolder','${state.contextMenu.id}')" style="padding:8px 16px;cursor:pointer;font-size:12px;" onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">다른 위치로 이동</div>
             <div style="padding:6px 16px;border-top:1px solid ${t.bd};">
               <div style="font-size:10px;color:${t.mt};margin-bottom:6px;">폴더 색상</div>
               <div style="display:flex;gap:6px;flex-wrap:wrap;">
                 ${["#60a5fa","#34d399","#f87171","#fbbf24","#a78bfa","#fb923c","#38bdf8","#e879f9","#94a3b8","#f472b6","#4ade80","#fb7185"].map(color=>`
                   <div onclick="window._changeColor('${state.contextMenu.id}','${color}')"
                     style="width:18px;height:18px;border-radius:50%;background:${color};cursor:pointer;border:2px solid ${state.folders.find(f=>f.id===state.contextMenu.id)?.color===color?"#fff":"transparent"};"
                     title="${color}"></div>`).join("")}
               </div>
             </div>
             <div onclick="window._ctxA('delfolder','${state.contextMenu.id}')" style="padding:8px 16px;cursor:pointer;font-size:12px;color:#f87171;border-top:1px solid ${t.bd};" onmouseenter="this.style.background='${t.hv}'" onmouseleave="this.style.background='transparent'">폴더 삭제</div>`}
      </div>`:""}

    <!-- 이동 모달 -->
    ${renderMoveModal(t,fontFamily)}
  </div>`;

  if(activeFile){const ed=document.getElementById("editor");if(ed)ed.innerHTML=textToHTML(activeFile.content);}
  if(state.renamingId) setTimeout(()=>{const el=document.getElementById("renameTabInput")||document.getElementById("renameInput");if(el){el.focus();el.select();}},50);
  if(state.newFolderMode) setTimeout(()=>document.getElementById("newFolderInput")?.focus(),50);
  setTimeout(initSortables,0);

  // ── Handlers ────────────────
  window._pwi=(v)=>{state.pwInput=v;};window._pwLogin=tryLogin;
  window._btn=(a)=>{
    if     (a==="dark")          {state.dark=!state.dark;render();}
    else if(a==="wrap")          {state.wordWrap=!state.wordWrap;render();}
    else if(a==="zm-")           {state.zoom=Math.max(state.zoom-10,50);render();}
    else if(a==="zm+")           {state.zoom=Math.min(state.zoom+10,200);render();}
    else if(a==="find")          {const st=document.getElementById("editor")?.scrollTop||0;state.findOpen=!state.findOpen;render();if(state.findOpen)setTimeout(()=>document.getElementById("findInput")?.focus(),50);else{const ed=document.getElementById("editor");if(ed)ed.scrollTop=st;}}
    else if(a==="find_exec")     handleFind();
    else if(a==="replace_exec")  handleReplace();
    else if(a==="newfolder")     {state.newFolderMode=true;state.newFolderParentId=null;render();}
    else if(a==="confirmfolder") newFolder(state.newFolderParentId);
    else if(a==="sidebar")       {state.sidebarOpen=!state.sidebarOpen;render();}
    else if(a==="lock")          {localStorage.removeItem("notepad_authed");state.authed=false;state.pwInput="";state.pwError=false;render();}
  };
  window._setFont=(v)=>{state.font=v;render();};
  window._tf=toggleFolder;
  window._of=(id)=>{const f=state.files.find(x=>x.id===id);if(f)openFile(f);};
  window._nf=newFile;
  window._at=(id)=>{
    const ed=document.getElementById("editor");
    if(ed&&state.activeTab){
      state.files=state.files.map(f=>f.id===state.activeTab?{...f,content:ed.innerHTML}:f);
      state.scrollPositions={...state.scrollPositions,[state.activeTab]:ed.scrollTop};
    }
    const prevScroll=document.getElementById("tabBar")?.scrollLeft||0;
    state.activeTab=id;render();
    const tabBar=document.getElementById("tabBar");
    if(tabBar) tabBar.scrollLeft=prevScroll;
    const newEd=document.getElementById("editor");
    if(newEd) newEd.scrollTop=state.scrollPositions[id]||0;
  };
  window._ct=(fileId)=>{
    const ed=document.getElementById("editor");
    if(ed&&state.activeTab) state.files=state.files.map(f=>f.id===state.activeTab?{...f,content:ed.innerHTML}:f);
    closeTab(fileId);
  };
  window._tc=handleTextChange;
  window._fmt=applyFormat;
  window._export=exportFile;
  window._cvtMd=convertToMd;
  window._refresh=refreshData;
  window._fi=(v,w)=>{if(w==="find"){if(v!==state.findText)state.findIndex=-1;state.findText=v;}else state.replaceText=v;};
  window._nfi=(v)=>{state.newFolderName=v;};
  window._nfk=(e)=>{if(e.key==="Enter")newFolder(state.newFolderParentId);if(e.key==="Escape"){state.newFolderMode=false;state.newFolderName="";state.newFolderParentId=null;render();}};
  window._ri=(v)=>{state.renamingVal=v;};
  window._rk=(e,id)=>{if(e.key==="Enter")commitRename(id);if(e.key==="Escape"){state.renamingId=null;render();}};
  window._rc=(id)=>commitRename(id);
  window._startRename=(id)=>{
    state.renamingId=id;state.renamingVal=state.files.find(f=>f.id===id)?.name||"";render();
    setTimeout(()=>{const el=document.getElementById("renameTabInput")||document.getElementById("renameInput");if(el){el.focus();el.select();}},50);
  };
  window._cm=(e,type,id)=>{e.preventDefault();e.stopPropagation();state.contextMenu={type,id,x:e.clientX,y:e.clientY};render();};
  window._ctxA=(a,id)=>{
    if     (a==="rename")      {state.renamingId=id;state.renamingVal=state.files.find(f=>f.id===id)?.name||"";state.contextMenu=null;render();}
    else if(a==="delfile")     deleteFile(id);
    else if(a==="newfile")     {newFile(id);state.contextMenu=null;}
    else if(a==="delfolder")   deleteFolder(id);
    else if(a==="newsubfolder"){state.newFolderMode=true;state.newFolderParentId=id;state.contextMenu=null;render();}
    else if(a==="movefile")    {state.moveModal={itemId:id,itemType:"file"};state.contextMenu=null;render();}
    else if(a==="movefolder")  {state.moveModal={itemId:id,itemType:"folder"};state.contextMenu=null;render();}
  };
  window._moveTo=(targetId)=>{
    const {itemId,itemType}=state.moveModal;
    if(itemType==="file")   moveFileTo(itemId, targetId);
    else                    moveFolderTo(itemId, targetId==="__root__"?null:targetId);
  };
  window._closeMoveModal=()=>{state.moveModal=null;render();};
  window._findDir=(dir)=>handleFind(dir);
  window._changeColor=(id,color)=>changeFolderColor(id,color);
  window._paste=(e)=>{
    e.preventDefault();
    const text=e.clipboardData.getData("text/plain");
    const html=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .split("\n").map(l=>`<div>${l||"<br>"}</div>`).join("");
    document.execCommand("insertHTML",false,html);
    handleTextChange();
  };
  window._kd=(e)=>{
    if((e.ctrlKey||e.metaKey)&&e.key==="b"){e.preventDefault();applyFormat("bold");}
    if((e.ctrlKey||e.metaKey)&&e.key==="i"){e.preventDefault();applyFormat("italic");}
    if((e.ctrlKey||e.metaKey)&&e.key==="u"){e.preventDefault();applyFormat("underline");}
    if(e.key==="F5"){e.preventDefault();insertDateTime();}
    if((e.ctrlKey||e.metaKey)&&(e.key==="h"||e.key==="f")){e.preventDefault();state.findOpen=true;render();setTimeout(()=>document.getElementById("findInput")?.focus(),50);}
    if(e.key==="Escape"){
      const st=document.getElementById("editor")?.scrollTop||0;
      state.contextMenu=null;state.findOpen=false;state.moveModal=null;render();
      const ed=document.getElementById("editor");if(ed)ed.scrollTop=st;
    }
    if((e.ctrlKey||e.metaKey)&&(e.key==="="||e.key==="+")){e.preventDefault();state.zoom=Math.min(state.zoom+10,200);render();}
    if((e.ctrlKey||e.metaKey)&&e.key==="-"){e.preventDefault();state.zoom=Math.max(state.zoom-10,50);render();}
    if(e.key==="Tab"){e.preventDefault();document.execCommand("insertText",false,"    ");}
  };
  document.onclick=(e)=>{
    if(state.contextMenu&&!e.target.closest("#ctxmenu")){state.contextMenu=null;render();}
  };
}

render();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px;}
#editor::selection,#editor *::selection{background:#388bfd44;}
.drag-handle:active{cursor:grabbing;}
.sortable-ghost{opacity:0.35;background:#58a6ff22;}
.sortable-chosen{opacity:0.95;}
#tabBar::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#f6f8fa;color:#0969da;font-family:'Nanum Gothic',sans-serif;">불러오는 중...</div>
</body>
</html>
